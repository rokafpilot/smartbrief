            if (waypointLabelVisible) {
                routeWaypointLabels.forEach(labelMarker => {
                    if (labelMarker) {
                        labelMarker.map = on ? map : null;
                    }
                });
            }
        }

        async function getAviationWeatherData(lat, lon, icao = null) {
            try {
                // 백엔드를 통해 항공기상 API 호출 (프록시)
                console.log('항공기상 API 호출 (백엔드 프록시):', { lat, lon, icao });
                
                const response = await fetch('/api/aviation-weather', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        lat: lat,
                        lon: lon,
                        icao: icao
                    })
                });
                
                console.log('항공기상 API 응답 상태:', response.status, response.statusText);
                
                if (!response.ok) {
                    let errorText = '';
                    const contentType = response.headers.get('content-type');
                    
                    try {
                        if (contentType && contentType.includes('application/json')) {
                            const errorData = await response.json();
                            errorText = errorData.error || errorData.message || '알 수 없는 오류';
                        } else {
                            errorText = await response.text();
                            // HTML 응답인 경우 간단한 메시지만 추출
                            if (errorText.includes('<title>')) {
                                const titleMatch = errorText.match(/<title>([^<]+)<\/title>/);
                                if (titleMatch) {
                                    errorText = titleMatch[1];
                                } else {
                                    errorText = `HTTP ${response.status} ${response.statusText}`;
                                }
                            }
                        }
                        console.error('항공기상 API 오류 응답:', errorText);
                    } catch (e) {
                        console.error('응답 본문 읽기 실패:', e);
                        errorText = `HTTP ${response.status} ${response.statusText}`;
                    }
                    
                    // 더 자세한 에러 메시지 제공
                    if (response.status === 400) {
                        throw new Error(`API 요청 형식이 잘못되었습니다: ${errorText}`);
                    } else if (response.status === 401 || response.status === 403) {
                        throw new Error(`API 키 인증에 실패했습니다. checkwx API 키를 확인해주세요: ${errorText}`);
                    } else if (response.status === 404) {
                        throw new Error(`엔드포인트를 찾을 수 없습니다. 서버를 재시작해주세요: ${errorText}`);
                    }
                    throw new Error(`항공기상 API 오류 (${response.status}): ${errorText}`);
                }
                
                const data = await response.json();
                console.log('항공기상 API 데이터 수신:', data);
                return data;
            } catch (error) {
                console.error('항공기상 데이터 가져오기 오류:', error);
                throw error;
            }
        }

        // ── CAT(Clear Air Turbulence) 색상 경로 표시 ──────────────────────────
        async function displayCATTurbulence(points) {
            // 기존 CAT 폴리라인 제거
            catPolylines.forEach(pl => pl && pl.setMap(null));
            catPolylines = [];
            if (catLegendEl) { catLegendEl.remove(); catLegendEl = null; }

            if (!points || points.length < 2) return;

            // waypoint 배열 정리 (fl, actm 포함)
            const wps = points
                .filter(p => p.lat && (p.lng || p.lon))
                .map(p => ({
                    lat:  p.lat,
                    lng:  p.lng || p.lon,
                    name: p.ident || p.name || '',
                    fl:   p.fl   || null,
                    actm: p.actm || null,
                }));

            if (wps.length < 2) return;

            console.log(`[CAT] Open-Meteo 요청: ${wps.length}개 waypoint`);

            const resp = await fetch('/api/route-turb-openmeteo', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ waypoints: wps })
            });
            if (!resp.ok) { console.warn('[CAT] API 오류:', resp.status); return; }

            const result = await resp.json();
            if (result.error) { console.warn('[CAT]', result.error); return; }

            const segments = result.segments || [];
            console.log(`[CAT] 구간 ${segments.length}개 수신`);

            // 색상 폴리라인 그리기
            const infoWindow = new google.maps.InfoWindow();
            segments.forEach(seg => {
                const pl = new google.maps.Polyline({
                    path: [
                        { lat: seg.from_lat, lng: seg.from_lng },
                        { lat: seg.to_lat,   lng: seg.to_lng   }
                    ],
                    strokeColor: seg.color,
                    strokeOpacity: 0.85,
                    strokeWeight: seg.cat_level === 'NIL' ? 5 : 7,
                    map: map,
                    zIndex: 20
                });
                catPolylines.push(pl);

                // 클릭 → 정보창
                pl.addListener('click', evt => {
                    const flInfo = seg.fl_label ? `<br>순항고도: <b>${seg.fl_label}</b>` : '';
                    const pairInfo = seg.pressure_pairs ? `<br>분석 압력면: <span style="font-size:0.78em">${seg.pressure_pairs}</span>` : '';
                    const content = `
                        <div style="font-family:sans-serif;min-width:210px">
                            <div style="font-weight:bold;color:${seg.color};font-size:1em;margin-bottom:4px">
                                ✈ ${seg.from_wp} → ${seg.to_wp}
                            </div>
                            <div style="background:${seg.color};color:#fff;padding:3px 8px;border-radius:12px;display:inline-block;margin-bottom:6px;font-weight:bold">
                                ${seg.cat_level} — ${seg.cat_label}
                            </div>
                            <div style="font-size:0.85em;color:#444;line-height:1.6">
                                수직 Wind Shear: <b>${seg.max_shear_kt} kt</b>
                                ${flInfo}${pairInfo}
                            </div>
                            <div style="font-size:0.75em;color:#888;margin-top:4px">
                                Open-Meteo GFS · FL별 압력면 CAT 분석
                            </div>
                        </div>`;
                    infoWindow.setContent(content);
                    infoWindow.setPosition(evt.latLng);
                    infoWindow.open(map);
                });
            });

            // waypoint 점 (CAT 레벨별 색상)
            (result.waypoints || []).forEach(wp => {
                if (wp.cat_level === 'NIL') return; // NIL은 점 생략
                const circle = new google.maps.Circle({
                    center: { lat: wp.lat, lng: wp.lng },
                    radius: 25000,
                    strokeColor: wp.color,
                    strokeOpacity: 0.9,
                    strokeWeight: 2,
                    fillColor: wp.color,
                    fillOpacity: 0.4,
                    map: map,
                    zIndex: 21
                });
                catPolylines.push(circle);
            });

            // 범례 표시
            _showCATLegend(result.source || 'Open-Meteo GFS');

        // ── WAFS GRIB2 터뷸런스 폴리곤 표시 ───────────────────────────────────
        async function displayWAFSTurbulence(points) {
            // 기존 제거

                    lng:  p.lng || p.lon,
                    name: p.ident || p.name || '',
                    fl:   p.fl || null,

        async function getSIGMETData(lat, lon, bbox = null) {
            try {
                console.log('SIGMET API 호출:', { lat, lon, bbox });
                
                const requestBody = {};
                if (bbox) {
                    requestBody.bbox = bbox;
                } else if (lat !== null && lon !== null) {
                    requestBody.lat = lat;
                    requestBody.lon = lon;
                } else {
                    return null;
                }
                
                const response = await fetch('/api/aviation-weather/sigmet', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });
                
                if (!response.ok) {
                    console.warn('SIGMET API 오류:', response.status);
                    return null;
                }
                
                const data = await response.json();
                console.log('SIGMET 데이터 수신:', data);
                return data;
            } catch (error) {
                console.error('SIGMET 데이터 가져오기 오류:', error);
                return null;
            }
        }

        // 점이 폴리곤 내부에 있는지 또는 항로와 교차하는지 확인
        function isSIGMETNearRoute(sigmetCoords, routePoints, maxDistanceNM = 200) {
            if (!sigmetCoords || sigmetCoords.length < 3) {
                console.warn('isSIGMETNearRoute: 좌표 데이터 없음');
                return false;
            }
            if (!routePoints || routePoints.length === 0) {
                console.warn('isSIGMETNearRoute: 항로 포인트 없음');
                return true; // 항로가 없으면 모두 표시
            }
            
            // SIGMET 폴리곤의 중심점 계산
            let centerLat = 0, centerLon = 0;
            sigmetCoords.forEach(coord => {
                if (coord && typeof coord.lat === 'number' && typeof coord.lng === 'number') {
                    centerLat += coord.lat;
                    centerLon += coord.lng;
                }
            });
            centerLat /= sigmetCoords.length;
            centerLon /= sigmetCoords.length;
            
            // 항로와의 최소 거리 계산
            const minDist = getMinDistanceFromRoute(centerLat, centerLon);
            console.log(`SIGMET 중심점 (${centerLat.toFixed(2)}, ${centerLon.toFixed(2)}) - 항로 최소 거리: ${minDist.toFixed(1)}nm`);
            if (minDist <= maxDistanceNM) {
                console.log(`✓ 중심점이 항로 ${minDist.toFixed(1)}nm 이내`);
                return true;
            }
            
            // SIGMET 폴리곤의 각 점이 항로 근처에 있는지 확인
            for (let i = 0; i < Math.min(5, sigmetCoords.length); i++) {
                const coord = sigmetCoords[i];
                if (coord && typeof coord.lat === 'number' && typeof coord.lng === 'number') {
                    const dist = getMinDistanceFromRoute(coord.lat, coord.lng);
                    if (dist <= maxDistanceNM) {
                        console.log(`✓ SIGMET 점 #${i} (${coord.lat.toFixed(2)}, ${coord.lng.toFixed(2)})이 항로 ${dist.toFixed(1)}nm 이내`);
                        return true;
                    }
                }
            }
            
            // 항로의 각 점이 SIGMET 폴리곤 근처에 있는지 확인 (샘플링)
            const sampleSize = Math.min(20, routePoints.length);
            const step = Math.max(1, Math.floor(routePoints.length / sampleSize));
            for (let i = 0; i < routePoints.length; i += step) {
                const routePoint = routePoints[i];
                if (routePoint && typeof routePoint.lat === 'number' && typeof routePoint.lng === 'number') {
                    const dist = calculateDistanceNM(centerLat, centerLon, routePoint.lat, routePoint.lng);
                    if (dist <= maxDistanceNM) {
                        console.log(`✓ 항로 점 #${i} (${routePoint.lat.toFixed(2)}, ${routePoint.lng.toFixed(2)})이 SIGMET ${dist.toFixed(1)}nm 이내`);
                        return true;
                    }
                }
            }
            
            // 추가 체크: SIGMET 폴리곤의 경계 박스와 항로 경계 박스가 겹치는지 확인
            let sigmetMinLat = Infinity, sigmetMaxLat = -Infinity;
            let sigmetMinLon = Infinity, sigmetMaxLon = -Infinity;
            sigmetCoords.forEach(coord => {
                if (coord && typeof coord.lat === 'number' && typeof coord.lng === 'number') {
                    sigmetMinLat = Math.min(sigmetMinLat, coord.lat);
                    sigmetMaxLat = Math.max(sigmetMaxLat, coord.lat);
                    sigmetMinLon = Math.min(sigmetMinLon, coord.lng);
                    sigmetMaxLon = Math.max(sigmetMaxLon, coord.lng);
                }
            });
            
            let routeMinLat = Infinity, routeMaxLat = -Infinity;
            let routeMinLon = Infinity, routeMaxLon = -Infinity;
            routePoints.forEach(point => {
                if (point && typeof point.lat === 'number' && typeof point.lng === 'number') {
                    routeMinLat = Math.min(routeMinLat, point.lat);
                    routeMaxLat = Math.max(routeMaxLat, point.lat);
                    routeMinLon = Math.min(routeMinLon, point.lng);
                    routeMaxLon = Math.max(routeMaxLon, point.lng);
                }
            });
            
            // 경계 박스가 겹치는지 확인 (약 200nm = 약 3.6도)
            const buffer = 3.6;
            if (sigmetMaxLat >= routeMinLat - buffer && sigmetMinLat <= routeMaxLat + buffer &&
                sigmetMaxLon >= routeMinLon - buffer && sigmetMinLon <= routeMaxLon + buffer) {
                console.log(`✓ SIGMET 경계 박스가 항로 경계 박스와 겹침`);
                return true;
            }
            
            // 최종 체크: 항로 경계 박스 내에 SIGMET이 있는지 확인 (더 관대한 조건)
            if (sigmetMinLat >= routeMinLat - buffer && sigmetMaxLat <= routeMaxLat + buffer &&
                sigmetMinLon >= routeMinLon - buffer && sigmetMaxLon <= routeMaxLon + buffer) {
                console.log(`✓ SIGMET이 항로 경계 박스 내부에 있음`);
                return true;
            }
            
            console.log(`✗ SIGMET이 항로에서 ${minDist.toFixed(1)}nm 이상 떨어져 있음 (최대 허용: ${maxDistanceNM}nm)`);
            console.log(`  SIGMET 경계: (${sigmetMinLat.toFixed(2)}, ${sigmetMinLon.toFixed(2)}) ~ (${sigmetMaxLat.toFixed(2)}, ${sigmetMaxLon.toFixed(2)})`);
            console.log(`  항로 경계: (${routeMinLat.toFixed(2)}, ${routeMinLon.toFixed(2)}) ~ (${routeMaxLat.toFixed(2)}, ${routeMaxLon.toFixed(2)})`);
            return false;
        }

                        return null;
                    }).filter(c => c !== null && !isNaN(c.lat) && !isNaN(c.lng));
                    
                    if (normalizedCoords.length < 3) {
                        console.warn(`ISIGMET #${idx}: 좌표 변환 실패`, coords);
                        return;
                    }
                    
                    // 항로와 가까운 SIGMET만 표시 (200nm 이내 또는 경계 박스 겹침)
                    // 디버깅: 필터링 로직 확인
                    let shouldDisplay = true;
                    if (routePoints && routePoints.length > 0) {
                        console.log(`ISIGMET #${idx} 필터링 체크 시작...`);
                        shouldDisplay = isSIGMETNearRoute(normalizedCoords, routePoints, 200);
                        console.log(`ISIGMET #${idx} 필터링 결과: ${shouldDisplay ? '표시' : '필터링'}`);
                        
                        // 필터링되었지만 경계 박스가 겹치면 표시 (더 관대한 조건)
                        if (!shouldDisplay) {
                            // 항로 경계 계산
                            let routeMinLat = Infinity, routeMaxLat = -Infinity;
                            let routeMinLon = Infinity, routeMaxLon = -Infinity;
                            routePoints.forEach(point => {
                                if (point && typeof point.lat === 'number' && typeof point.lng === 'number') {
                                    routeMinLat = Math.min(routeMinLat, point.lat);
                                    routeMaxLat = Math.max(routeMaxLat, point.lat);
                                    routeMinLon = Math.min(routeMinLon, point.lng);
                                    routeMaxLon = Math.max(routeMaxLon, point.lng);
                                }
                            });
                            
                            // SIGMET 경계 계산
                            let sigmetMinLat = Infinity, sigmetMaxLat = -Infinity;
                            let sigmetMinLon = Infinity, sigmetMaxLon = -Infinity;
                            normalizedCoords.forEach(coord => {
                                if (coord && typeof coord.lat === 'number' && typeof coord.lng === 'number') {
                                    sigmetMinLat = Math.min(sigmetMinLat, coord.lat);
                                    sigmetMaxLat = Math.max(sigmetMaxLat, coord.lat);
                                    sigmetMinLon = Math.min(sigmetMinLon, coord.lng);
                                    sigmetMaxLon = Math.max(sigmetMaxLon, coord.lng);
                                }
                            });
                            
                            // 경계 박스가 겹치는지 확인 (더 넓은 범위: ±5도 = 약 300nm)
                            const buffer = 5;
                            if (sigmetMaxLat >= routeMinLat - buffer && sigmetMinLat <= routeMaxLat + buffer &&
                                sigmetMaxLon >= routeMinLon - buffer && sigmetMinLon <= routeMaxLon + buffer) {
                                console.log(`✓ ISIGMET #${idx}: 경계 박스 겹침으로 표시`);
                                shouldDisplay = true;
                            }
                        }
                    }
                    
                    if (!shouldDisplay) {
                        filteredCount++;
                        console.log(`ISIGMET #${idx}: 항로에서 너무 멀어서 필터링됨`);
                        return;
                    }
                    
                    const hazard = sigmet.hazard || 'UNKNOWN';
                    const colors = hazardColors[hazard] || { stroke: '#757575', fill: '#9e9e9e' };
                    
                    const path = normalizedCoords;
                    
                    const polygon = new google.maps.Polygon({
                        paths: path,
                        strokeColor: colors.stroke,
                        strokeOpacity: 0.8,
                        strokeWeight: 2,
                        fillColor: colors.fill,
                        fillOpacity: 0.2,
                        zIndex: 1000005,
                        map: map
                    });
                    
                    // 클릭 이벤트
                    const infoWindow = new google.maps.InfoWindow();
                    polygon.addListener('click', (event) => {
                        const clickLat = event.latLng.lat();
                        const clickLon = event.latLng.lng();
                        
                        let content = `<div style="max-width: 500px; font-family: Arial, sans-serif;">`;
                        content += `<div style="background: #2c3e50; color: white; padding: 10px; margin: -8px -8px 10px -8px; border-radius: 4px 4px 0 0;">`;
                        content += `<h6 style="margin: 0; font-size: 14px; font-weight: bold;">Data at (${clickLat.toFixed(3)}, ${clickLon.toFixed(3)})</h6>`;
                        content += `</div>`;
                        
                        // ISIGMET인지 표시
                        const isISIGMET = sigmet.firName || sigmet.icaoId;
                        const sigmetType = isISIGMET ? 'ISIGMET (International SIGMET)' : 'SIGMET/AIRMET';
                        content += `<div style="margin-bottom: 8px; color: ${isISIGMET ? '#d32f2f' : '#1976d2'}; font-weight: bold;">${sigmetType}</div>`;
                        content += `<div style="margin-bottom: 8px;"><strong>Hazard:</strong> ${hazard === 'ICE' ? 'Icing' : hazard === 'TURB' ? 'Turbulence' : hazard}</div>`;
                        
                        // FIR Name
                        if (sigmet.firName) {
                            content += `<div style="margin-bottom: 8px;"><strong>FIR Name:</strong> ${sigmet.firId || ''} ${sigmet.firName}</div>`;
                        } else if (sigmet.icaoId) {
                            content += `<div style="margin-bottom: 8px;"><strong>FIR Name:</strong> ${sigmet.icaoId}</div>`;
                        }
                        
                        // Hazard with qualifier
                        let hazardText = hazard;
                        if (sigmet.qualifier) {
                            hazardText += ` - ${sigmet.qualifier}`;
                        }
                        content += `<div style="margin-bottom: 8px;"><strong>Hazard:</strong> ${hazardText}</div>`;
                        
                        // Time
                        if (sigmet.validTimeFrom) {
                            const beginTime = new Date(sigmet.validTimeFrom * 1000);
                            content += `<div style="margin-bottom: 8px;"><strong>Begins:</strong> ${beginTime.toISOString()}</div>`;
                        }
                        if (sigmet.validTimeTo) {
                            const endTime = new Date(sigmet.validTimeTo * 1000);
                            content += `<div style="margin-bottom: 8px;"><strong>Ends:</strong> ${endTime.toISOString()}</div>`;
                        }
                        
                        // Altitude
                        if (sigmet.base !== undefined && sigmet.top !== undefined) {
                            content += `<div style="margin-bottom: 8px;"><strong>Top:</strong> ${sigmet.top.toLocaleString()}</div>`;
                            content += `<div style="margin-bottom: 8px;"><strong>Base:</strong> ${sigmet.base}</div>`;
                        }
                        
                        // Movement
                        if (sigmet.dir && sigmet.spd !== undefined) {
                            const dirNames = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
                            let dirName = sigmet.dir;
                            if (typeof sigmet.dir === 'number') {
                                const dirIndex = Math.round(sigmet.dir / 45) % 8;
                                dirName = dirNames[dirIndex];
                            }
                            content += `<div style="margin-bottom: 8px;"><strong>Movement:</strong> ${dirName} at ${sigmet.spd} kt</div>`;
                        }
                        
                        // Change
                        if (sigmet.chng) {
                            content += `<div style="margin-bottom: 8px;"><strong>Change:</strong> ${sigmet.chng}</div>`;
                        }
                        
                        // Raw SIGMET Text
                        if (sigmet.rawSigmet) {
                            content += `<div style="margin-top: 15px; padding-top: 10px; border-top: 1px solid #ddd;">`;
                            content += `<div style="font-weight: bold; margin-bottom: 5px;">Raw SIGMET Text:</div>`;
                            content += `<div style="font-family: 'Courier New', monospace; font-size: 0.85em; white-space: pre-wrap; background: #f5f5f5; padding: 10px; border-radius: 4px; line-height: 1.4;">${sigmet.rawSigmet}</div>`;
                            content += `</div>`;
                        }
                        
                        content += `</div>`;
                        infoWindow.setContent(content);
                        infoWindow.setPosition(event.latLng);
                        infoWindow.open(map);
                    });
                    
                    sigmetOverlays.push(polygon);
                    displayedCount++;
                });
            }
            
            console.log(`SIGMET 오버레이 ${displayedCount}개 표시됨 (필터링: ${filteredCount}개, 항로 200nm 이내)`);
            if (displayedCount === 0 && (sigmetData.airsigmets?.length > 0 || sigmetData.isigmets?.length > 0)) {
                console.warn('SIGMET 데이터는 있지만 표시되지 않음. 좌표 형식이나 필터링 로직을 확인하세요.');
                console.warn('필터링을 일시적으로 비활성화하려면 isSIGMETNearRoute 함수를 항상 true를 반환하도록 수정하세요.');
            }
        }

        async function displayPIREPMarkers(pireps) {
            pireps.forEach((pirep, idx) => {
                if (!pirep.lat || !pirep.lon) return;
                
                // 난류 또는 착빙 정보가 있는 경우만 표시
                const hasTurbulence = pirep.tbInt1 && pirep.tbInt1 !== 'NEG';
                const hasIcing = pirep.icgInt1 && pirep.icgInt1 !== 'NEG';
                
                if (!hasTurbulence && !hasIcing) return;
                
                // 위험도에 따른 색상 및 크기
                let markerColor = '#4285F4'; // 기본 파랑
                let markerSize = 12;
                
                if (hasTurbulence) {
                    const turbIntensity = pirep.tbInt1;
                    if (turbIntensity.includes('SEV') || turbIntensity.includes('EXTM')) {
                        markerColor = '#d32f2f'; // 빨강
                        markerSize = 20;
                    } else if (turbIntensity.includes('MOD')) {
                        markerColor = '#ff9800'; // 주황
                        markerSize = 16;
                    } else {
                        markerColor = '#ffeb3b'; // 노랑
                        markerSize = 14;
                    }
                }
                
                if (hasIcing) {
                    const iceIntensity = pirep.icgInt1;
                    if (iceIntensity.includes('SEV') || iceIntensity.includes('HVY')) {
                        markerColor = '#2196f3'; // 파랑 (착빙)
                        markerSize = Math.max(markerSize, 18);
                    } else if (iceIntensity.includes('MOD')) {
                        markerColor = '#03a9f4'; // 밝은 파랑
                        markerSize = Math.max(markerSize, 16);
                    }
                }
                
                // 마커 생성
                const markerDiv = document.createElement('div');
                markerDiv.style.width = `${markerSize}px`;
                markerDiv.style.height = `${markerSize}px`;
                markerDiv.style.borderRadius = '50%';
                markerDiv.style.backgroundColor = markerColor;
                markerDiv.style.opacity = '0.8';
                markerDiv.style.border = '2px solid #FFFFFF';
                markerDiv.style.boxShadow = '0 2px 4px rgba(0,0,0,0.5)';
                markerDiv.style.cursor = 'pointer';
                
                const marker = new google.maps.marker.AdvancedMarkerElement({
                    position: { lat: pirep.lat, lng: pirep.lon },
                    map: map,
                    content: markerDiv,
                    title: `PIREP: ${hasTurbulence ? '난류' : ''}${hasTurbulence && hasIcing ? '/' : ''}${hasIcing ? '착빙' : ''}`,
                    zIndex: 1000006
                });
                
                // 클릭 이벤트
                const infoWindow = new google.maps.InfoWindow();
                marker.addListener('click', () => {
                    let content = `<div style="max-width: 400px;"><h6>PIREP</h6>`;
                    if (pirep.rawOb) {
                        content += `<div style="font-family: monospace; font-size: 0.85em; background: #f5f5f5; padding: 8px; border-radius: 4px; margin: 5px 0;">${pirep.rawOb}</div>`;
                    }
                    
                    if (hasTurbulence) {
                        content += `<div style="margin-top: 8px; padding: 6px; background: #ff9800; color: white; border-radius: 4px;">`;
                        content += `<strong>난류:</strong> ${pirep.tbInt1} ${pirep.tbType1 || ''}`;
                        if (pirep.tbBas1 && pirep.tbTop1) {
                            content += ` (${pirep.tbBas1}ft - ${pirep.tbTop1}ft)`;
                        }
                        content += `</div>`;
                    }
                    
                    if (hasIcing) {
                        content += `<div style="margin-top: 8px; padding: 6px; background: #2196f3; color: white; border-radius: 4px;">`;
                        content += `<strong>착빙:</strong> ${pirep.icgInt1} ${pirep.icgType1 || ''}`;
                        if (pirep.icgBas1 && pirep.icgTop1) {
                            content += ` (${pirep.icgBas1}ft - ${pirep.icgTop1}ft)`;
                        }
                        content += `</div>`;
                    }
                    
                    if (pirep.obsTime) {
                        const obsDate = new Date(pirep.obsTime * 1000);
                        content += `<p style="margin-top: 8px; color: #666; font-size: 0.85em;">관측 시간: ${obsDate.toLocaleString('ko-KR')}</p>`;
                    }
                    
                    content += `</div>`;
                    infoWindow.setContent(content);
                    infoWindow.open(map, marker);
                });
                
                pirepMarkers.push(marker);
            });
            
            console.log(`PIREP 마커 ${pirepMarkers.length}개 표시됨`);
        }

        async function setWeatherVisibility(on) {
            weatherVisible = on;
            await ensureMapReady();
            
            if (on) {
                // 날씨 정보 표시
                if (routePoints.length === 0) {
                    showAlert('먼저 항로를 표시해주세요.', 'warning');
                    const switchWeather = document.getElementById('switchWeather');
                    if (switchWeather) switchWeather.checked = false;
                    return;
                }
                
                // Windy API는 Point Forecast API를 직접 사용합니다
                
                // 기존 날씨 마커 및 오버레이 제거
                weatherMarkers.forEach(marker => {
                    if (marker) {
                        if (typeof marker.setMap === 'function') {
                            marker.setMap(null);
                        } else {
                            marker.map = null;
                        }
                    }
                });
                weatherMarkers = [];
                
                // SIGMET 오버레이 제거
                sigmetOverlays.forEach(overlay => {
                    if (overlay && overlay.setMap) {
                        overlay.setMap(null);
                    }
                });
                sigmetOverlays = [];
                
                // PIREP 마커 제거
                pirepMarkers.forEach(marker => {
                    if (marker) {
                        if (typeof marker.setMap === 'function') {
                            marker.setMap(null);
                        } else {
                            marker.map = null;
                        }
                    }
                });
                pirepMarkers = [];
                
                // 항로 경계 계산 (bbox) - 더 정확하게 계산
                let minLat = Infinity, maxLat = -Infinity;
                let minLon = Infinity, maxLon = -Infinity;
                routePoints.forEach(point => {
                    if (point.lat && point.lng) {
                        minLat = Math.min(minLat, point.lat);
                        maxLat = Math.max(maxLat, point.lat);
                        minLon = Math.min(minLon, point.lng);
                        maxLon = Math.max(maxLon, point.lng);
                    }
                });
                
                // 경계 확장 (±2도, 약 120nm) - 항로 주변 넓은 범위
                const bbox = `${minLat - 2},${minLon - 2},${maxLat + 2},${maxLon + 2}`;
                
                // SIGMET/AIRMET 및 ISIGMET 로드 및 표시 (항로와 교차하는 것만)
                try {
                    const sigmetData = await getSIGMETData(null, null, bbox);
                    if (sigmetData) {
                        console.log('SIGMET 데이터 수신:', {
                            airsigmets: sigmetData.airsigmets?.length || 0,
                            isigmets: sigmetData.isigmets?.length || 0,
                            total: (sigmetData.airsigmets?.length || 0) + (sigmetData.isigmets?.length || 0)
                        });
                        await displaySIGMETOverlays(sigmetData, routePoints);
                    } else {
                        console.warn('SIGMET 데이터가 없습니다.');
                    }
                } catch (error) {
                    console.error('SIGMET/ISIGMET 로드 오류:', error);
                }
                
                // PIREP 로드 및 표시 (항로 경계 내에서 한 번만 조회, 항로와 가까운 것만 필터링)
                try {
                    // 항로 중심점 계산
                    const centerLat = (minLat + maxLat) / 2;
                    const centerLon = (minLon + maxLon) / 2;
                    
                    // 항로 길이 계산 (대략적인 거리)
                    let routeLength = 0;
                    for (let i = 1; i < routePoints.length; i++) {
                        if (routePoints[i-1].lat && routePoints[i-1].lng && 
                            routePoints[i].lat && routePoints[i].lng) {
                            routeLength += calculateDistanceNM(
                                routePoints[i-1].lat, routePoints[i-1].lng,
                                routePoints[i].lat, routePoints[i].lng
                            );
                        }
                    }
                    
                    // 항로 길이에 따라 반경 조정 (최대 100nm)
                    const searchRadius = Math.min(100, Math.max(50, routeLength / 2));
                    
                    // 한 번만 API 호출
                    const pirepData = await getPIREPData(centerLat, centerLon, null, searchRadius);
                    if (pirepData && pirepData.pireps && pirepData.pireps.length > 0) {
                        // 항로와 가까운 PIREP만 필터링 (20nm 이내)
                        const filteredPireps = pirepData.pireps.filter(pirep => {
                            if (!pirep.lat || !pirep.lon) return false;
                            return getMinDistanceFromRoute(pirep.lat, pirep.lon) <= 20; // 20nm 이내
                        });
                        
                        if (filteredPireps.length > 0) {
                            await displayPIREPMarkers(filteredPireps);
                        }
                    }
                } catch (error) {
                    console.error('PIREP 로드 오류:', error);
                }
                
                // ── CAT 터뷸런스 색상 경로 (Open-Meteo GFS 압력면 Shear) ──
                try {
                    await displayCATTurbulence(routePoints);
                } catch (e) {
                    console.warn('CAT 분석 오류:', e);
                }

                // ── WAFS GRIB2 터뷸런스 폴리곤 (NOMADS bbox 필터) ──
                try {
                    await displayWAFSTurbulence(routePoints);
                } catch (e) {
                    console.warn('WAFS 터뷸런스 로드 오류:', e);
                }

                // route 상의 공항(airport)만 필터링하여 날씨 정보 가져오기
                // 공항 좌표 데이터가 로드되었는지 확인
                if (!airportsLoaded) {
                    await loadAirports();
                }
                
                // routePoints에서 공항만 필터링 (ident가 4자리이고 airports.csv에 있는 경우)
                const airportPoints = routePoints.filter(point => {
                    if (!point.ident) return false;
                    const ident = point.ident.toUpperCase();
                    // 4자리 ICAO 코드이고 공항 데이터에 있는 경우만
                    return ident.length === 4 && airportCoordinates[ident];
                });
                
                console.log(`Route 상 공항 필터링: 전체 ${routePoints.length}개 중 ${airportPoints.length}개 공항`);
                
                for (const point of airportPoints) {
                    if (!point.lat || !point.lng) continue;
                    
                    try {
                        const lat = point.lat;
                        const lon = point.lng;
                        
                        // 날씨 정보를 표시할 마커 생성
                        const weatherInfoWindow = new google.maps.InfoWindow({
                            content: '<div class="weather-info">날씨 정보 로딩 중...</div>'
                        });
                        
                        // AdvancedMarkerElement 사용
                        const weatherMarkerDiv = document.createElement('div');
                        weatherMarkerDiv.style.width = '16px';
                        weatherMarkerDiv.style.height = '16px';
                        weatherMarkerDiv.style.borderRadius = '50%';
                        weatherMarkerDiv.style.backgroundColor = '#4285F4';
                        weatherMarkerDiv.style.opacity = '0.7';
                        weatherMarkerDiv.style.border = '2px solid #FFFFFF';
                        weatherMarkerDiv.style.boxShadow = '0 2px 4px rgba(0,0,0,0.3)';
                        
                        const weatherMarker = new google.maps.marker.AdvancedMarkerElement({
                            position: { lat: lat, lng: lon },
                            map: map,
                            content: weatherMarkerDiv,
                            title: point.ident || 'Weather Info',
                            zIndex: 1000010
                        });
                        
                        // 마커 클릭 시 날씨 정보 표시
                        weatherMarker.addListener('click', async () => {
                            console.log('날씨 마커 클릭됨:', point.ident, lat, lon);
                            
                            // 로딩 메시지 표시
                            weatherInfoWindow.setContent(`<div class="weather-info"><h6>${point.ident || 'Waypoint'}</h6><p>날씨 정보를 가져오는 중...</p></div>`);
                            weatherInfoWindow.open(map, weatherMarker);
                            
                            try {
                                // 항공기상 API를 사용하여 METAR/TAF/ATIS 정보 가져오기
                                const weatherData = await getAviationWeatherData(lat, lon, point.ident);
                                console.log('항공기상 데이터:', weatherData);
                                
                                // PIREP과 SIGMET은 지도 오버레이로 표시되므로 InfoWindow에서는 METAR/TAF만 표시
                                
                                let content = `<div class="weather-info" style="max-width: 500px; max-height: 600px; overflow-y: auto;"><h6>${point.ident || 'Waypoint'}</h6>`;
                                
                                if (weatherData) {
                                    // 공항 코드 표시
                                    if (weatherData.icao && weatherData.icao !== 'N/A') {
                                        content += `<p><strong>공항:</strong> ${weatherData.icao}</p>`;
                                    }
                                    
                                    // METAR 표시
                                    if (weatherData.metar) {
                                        content += `<div style="margin-top: 10px;"><strong>METAR:</strong></div>`;
                                        let metarText = '';
                                        if (typeof weatherData.metar === 'string') {
                                            // 원시 METAR 문자열
                                            metarText = weatherData.metar;
                                        } else if (weatherData.metar.rawOb) {
                                            // Aviation Weather Center API 응답
                                            metarText = weatherData.metar.rawOb;
                                        } else {
                                            metarText = JSON.stringify(weatherData.metar);
                                        }
                                        content += `<div style="font-family: monospace; background: #f5f5f5; padding: 8px; border-radius: 4px; margin: 5px 0; font-size: 0.9em; word-break: break-all;">${metarText}</div>`;
                                    }
                                    
                                    // TAF 표시
                                    if (weatherData.taf) {
                                        content += `<div style="margin-top: 10px;"><strong>TAF:</strong></div>`;
                                        let tafText = '';
                                        if (typeof weatherData.taf === 'string') {
                                            // 원시 TAF 문자열
                                            tafText = weatherData.taf;
                                        } else if (weatherData.taf.rawTAF) {
                                            // Aviation Weather Center API 응답
                                            tafText = weatherData.taf.rawTAF;
                                        } else {
                                            tafText = JSON.stringify(weatherData.taf);
                                        }
                                        content += `<div style="font-family: monospace; background: #e3f2fd; padding: 8px; border-radius: 4px; margin: 5px 0; font-size: 0.9em; word-break: break-all;">${tafText}</div>`;
                                    }
                                    
                                    // 데이터가 없는 경우
                                    if (!weatherData.metar && !weatherData.taf) {
                                        content += `<p style="color: #ff9800;">항공기상 데이터를 사용할 수 없습니다.</p>`;
                                    }
                                } else {
                                    content += `<p>항공기상 데이터를 찾을 수 없습니다.</p>`;
                                }
                                
                                content += '</div>';
                                weatherInfoWindow.setContent(content);
                                
                            } catch (error) {
                                console.error('항공기상 정보 가져오기 오류:', error);
                                weatherInfoWindow.setContent(`<div class="weather-info"><h6>${point.ident || 'Waypoint'}</h6><p>오류: ${error.message}</p></div>`);
                            }
                        });
                        
                        weatherMarkers.push(weatherMarker);
                        
                    } catch (error) {
                        console.error(`Waypoint ${point.ident} 날씨 정보 오류:`, error);
                    }
                }
                
                const sigmetCount = sigmetOverlays.length;
                const pirepCount = pirepMarkers.length;
                let alertMsg = `${weatherMarkers.length}개의 공항에 날씨 마커를 추가했습니다.`;
                if (sigmetCount > 0) {
                    alertMsg += ` SIGMET/AIRMET/ISIGMET ${sigmetCount}개가 지도에 표시되었습니다.`;
                }
                if (pirepCount > 0) {
                    alertMsg += ` PIREP ${pirepCount}개가 지도에 표시되었습니다.`;
                }
                alertMsg += ` 공항 마커를 클릭하면 METAR/TAF/ATIS 정보를 볼 수 있습니다.`;
                alertMsg += ` ISIGMET 폴리곤을 클릭하면 상세 정보를 볼 수 있습니다.`;
                showAlert(alertMsg, 'success');
                
            } else {

                // SIGMET 오버레이 숨김
                sigmetOverlays.forEach(overlay => {

                        overlay.setMap(null);
                    }
                });
                
                // PIREP 마커 숨김
                pirepMarkers.forEach(marker => {

        function collectAirportCodes(primaryCode, airportInfo) {
            const set = new Set();
            const push = (value) => {
                if (!value) return;
                if (typeof value !== 'string') {
                    value = String(value);
                }
                value = value.trim();
                if (!value) return;
                set.add(value.toUpperCase());
            };

            push(primaryCode);
            if (airportInfo && typeof airportInfo === 'object') {
                ['icao', 'iata', 'icao_code', 'iata_code', 'code', 'airport_code'].forEach(key => push(airportInfo[key]));
                if (Array.isArray(airportInfo.aliases)) {
                    airportInfo.aliases.forEach(push);
                }
                if (airportInfo.name) {
                    push(airportInfo.name);
                    push(airportInfo.name.replace(/[^A-Z0-9]/gi, ''));
                }
            }
            return Array.from(set).sort((a, b) => b.length - a.length);
        }

        function findMatchingGeojsonFile(codes) {
            if (!codes || codes.length === 0 || geojsonFileNames.length === 0) {
                return null;
            }
            const filesUpper = geojsonFileNames.map(file => ({ file, upper: file.toUpperCase() }));

            for (const code of codes) {
                const target = code.toUpperCase();
                // 우선순위: _CODE_ 포함 → CODE_ 로 시작 → _CODE 로 끝 → 그 외 포함
                let match = filesUpper.find(item => item.upper.includes(`_${target}_`));
                if (match) return match.file;
                match = filesUpper.find(item => item.upper.startsWith(`${target}_`));
                if (match) return match.file;
                match = filesUpper.find(item => item.upper.endsWith(`_${target}.GEOJSON`) || item.upper.endsWith(`_${target}.JSON`));
                if (match) return match.file;
                match = filesUpper.find(item => item.upper.includes(target));
                if (match) return match.file;
            }
            return null;
        }

        async function loadAirportGeojson(airportCode, airportInfo) {
            await ensureGeojsonFileList();

            const codes = collectAirportCodes(airportCode, airportInfo);

                showAlert('해당 공항의 GeoJSON 파일을 찾지 못했습니다.', 'info');

                const resp = await fetch(url, { cache: 'no-store' });
                if (!resp.ok) {
                    throw new Error(`HTTP ${resp.status}`);
                }
                const data = await resp.json();
                clearAirportOverlays();

                } else {
                    showAlert('공항 지도 데이터를 불러왔습니다.', 'success');
                }
            } catch (error) {
                console.error('공항 GeoJSON 로드 오류:', error);
                showAlert('공항 GeoJSON을 불러오는 중 오류가 발생했습니다.', 'danger');
            }
        }

        async function createFirLabelsForLayer(dataLayer) {
            const labels = [];
            let MarkerClass = null;
            let advancedAvailable = false;
            try {
                if (google.maps.marker && google.maps.marker.AdvancedMarkerElement) {
                    MarkerClass = google.maps.marker.AdvancedMarkerElement;
                    advancedAvailable = true;
                } else if (google.maps.importLibrary && typeof google.maps.importLibrary === 'function') {
                    try {
                        const markerLibrary = await google.maps.importLibrary('marker');
                        if (markerLibrary && markerLibrary.AdvancedMarkerElement) {
                            MarkerClass = markerLibrary.AdvancedMarkerElement;
                            advancedAvailable = true;
                        }
                    } catch (e) {
                        console.warn('AdvancedMarkerElement import 실패:', e);
                    }
                }
            } catch (error) {
                console.warn('AdvancedMarkerElement 확인 중 오류:', error);
            }

            dataLayer.forEach(feature => {
                const name = feature.getProperty('FIR_NAME') || feature.getProperty('name') || feature.getProperty('ICAO');
                if (!name) {
                    return;
                }

                let lat = parseFloat(feature.getProperty('CenterLat'));
                let lon = parseFloat(feature.getProperty('CenterLon'));
                let center = null;
                if (!Number.isNaN(lat) && !Number.isNaN(lon)) {
                    center = new google.maps.LatLng(lat, lon);
                } else {
                    center = getFeatureCenter(feature);
                }
                if (!center) {
                    return;
                }

                try {
                    if (advancedAvailable && MarkerClass) {
                        const div = document.createElement('div');
                        div.className = 'map-label fir-label';
                        div.textContent = String(name);
                        const marker = new MarkerClass({
                            map: firVisible ? map : null,
                            position: center,
                            content: div,
                            gmpClickable: false
                        });
                        marker.__firSetMap = (show) => {
                            marker.map = show ? map : null;
                        };
                        labels.push(marker);
                    } else {
                        // AdvancedMarkerElement fallback
                        const div = document.createElement('div');
                        div.className = 'map-label fir-label';
                        div.textContent = String(name);
                        div.style.fontWeight = '700';
                        div.style.fontSize = '13px';
                        div.style.color = '#ffffff';
                        
                        const marker = new google.maps.marker.AdvancedMarkerElement({
                            map: firVisible ? map : null,
                            position: center,
                            content: div,
                            title: String(name),
                            gmpClickable: false
                        });
                        marker.__firSetMap = (show) => {
                            marker.map = show ? map : null;
                        };
                        labels.push(marker);
                    }
                } catch (error) {
                    console.warn('FIR label 생성 오류', error, feature);
                }
            });
            console.log('FIR labels created:', labels.length);
            return labels;
        }

        function updateFirLabels(show) {
            if (!firLabels || !firLabels.length) {

            firLabels.forEach(item => {

                        }

        }
