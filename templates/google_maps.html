        function normalizeIdent(str) {
            if (!str) return '';
            return String(str)
                .toUpperCase()
                .replace(/\b(TWY|TAXIWAY|RWY|RUNWAY)\b/g, '')  // 공통 접두어 제거
                .replace(/\s+/g, '')
                .replace(/[-_]/g, '');
        }

        // 정규식 패턴을 함수 외부에서 한 번만 컴파일 (성능 최적화)
        const NOTAM_RESTRICTION_KEYWORDS = [
            'CLSD', 'CLOSED', 'NOT AVAILABLE', 'NOT AVAIL', 'UNAVAILABLE',
            'RESTRICTED', 'PROHIBITED', 'FORBIDDEN', 'NOT AUTHORIZED',
        ];
        const NOTAM_RESTRICTION_PATTERN = new RegExp('\\b(' + NOTAM_RESTRICTION_KEYWORDS.join('|') + ')\\b', 'i');
        const NOTAM_RUNWAY_REGEX = /\bRWY\s+(\d{2}[LRC]?\/?\d{0,2}[LRC]?)\b/i;
        const NOTAM_PARTIAL_CLOSURE_REGEX = /(?:^|\s|E\)\s*)(?:TWY|TAXIWAY)\s+([A-Z0-9\-]+)\s+(?:BTN|BETWEEN)\s+(?:TXL\s+|TAXIWAY\s+)?([A-Z0-9\-]+)\s+(?:AND|&)\s+(?:TXL\s+|TAXIWAY\s+)?([A-Z0-9\-]+)\s+(?:CLSD|CLOSED|RESTRICTED|PROHIBITED|NOT\s+AVAILABLE)/ig;
        const NOTAM_TAXIWAY_PATTERN = /(?:^|\s|E\)\s*)(?:TWY|TAXIWAY)\s+([A-Z0-9\-\s,\/]+?)\s+(?:CLSD|CLOSED|RESTRICTED|PROHIBITED|FORBIDDEN|NOT\s+AVAILABLE)(?:\s+[A-Z\s]+)?/ig;
        const NOTAM_APRON_REGEX = /\b(APRON|RAMP)\s*([A-Z0-9\-]+)\s+(?:CLSD|CLOSED|RESTRICTED|PROHIBITED|NOT\s+AVAILABLE)/ig;
        const NOTAM_GATE_REGEX = /\bGATE\s*([A-Z]?\d{1,3})\s+(?:CLSD|CLOSED|RESTRICTED|PROHIBITED|NOT\s+AVAILABLE|U\/S|UNSERVICEABLE)\b/ig;
        const NOTAM_STAND_REGEX = /\bSTAND\s*([A-Z]?\d{1,3}(?:[A-Z])?)\s+(?:CLSD|CLOSED|RESTRICTED|PROHIBITED|NOT\s+AVAILABLE)\b/ig;
        const NOTAM_EXCLUDE_KEYWORDS = ['LIGHT', 'LGT', 'ILS', 'ALS', 'PAPI', 'VASI', 'LOC', 'GLIDESLOPE', 'DME', 'NDB', 'VOR', 'RVR', 'NAV', 'SYSTEM', 'SENSORS', 'APCH', 'RWYGUARD'];
        const NOTAM_EXCLUDE_PATTERN = new RegExp('\\b(' + NOTAM_EXCLUDE_KEYWORDS.join('|') + ')\\b', 'i');
        const NOTAM_CONFIRM_KEYWORDS = ['CLOSED', 'CLSD', 'PROHIBITED', 'FORBIDDEN', 'RESTRICTED'];
        const NOTAM_CONFIRM_PATTERN = new RegExp('\\b(' + NOTAM_CONFIRM_KEYWORDS.join('|') + ')\\b', 'i');
        const NOTAM_RWY_GLOBAL_REGEX = /\bRWY\s+(\d{2}[LRC]?\/?\d{0,2}[LRC]?)\b/gi;
        
        // Word boundary regex 캐싱 (성능 최적화)
        const wordBoundaryCache = new Map();
        const getWordBoundaryRegex = (str) => {
            if (!wordBoundaryCache.has(str)) {
                wordBoundaryCache.set(str, new RegExp('\\b' + str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b'));
            }
            return wordBoundaryCache.get(str);
        };

        function extractClosureIdentsFromNotams(notams) {
            const closures = { runway: new Set(), taxiway: new Set(), apron: new Set(), gate: new Set() };
            const partialClosures = [];
            // 텍스트 정리 헬퍼 함수
            const cleanText = (text) => {
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = text;
                let cleaned = tempDiv.textContent || tempDiv.innerText || text;
                // NOTAM 표준 접두어 제거 (E), F), G) 등)
                cleaned = cleaned.replace(/^[A-Z]\)\s*/gm, '').trim();
                return cleaned;
            };
            
            // 런웨이 추출 헬퍼 함수
            const extractRunways = (textUpper) => {
                // 전역 매칭을 위해 정규식 복사 (lastIndex 초기화)
                const rwyGlobalRegex = new RegExp(NOTAM_RWY_GLOBAL_REGEX);
                
                let m;
                while ((m = rwyGlobalRegex.exec(textUpper)) !== null) {
                    const rwyIdent = m[1];
                    const index = m.index;
                    
                    // 매칭된 위치 주변 문맥 확인 (앞뒤 60자)
                    const start = Math.max(0, index - 60);
                    const end = Math.min(textUpper.length, index + rwyIdent.length + 60);
                    const context = textUpper.substring(start, end);
                    
                    // 제외 키워드가 있고, 확정 키워드가 없으면 무시 (예: "LIGHTING SYSTEM RWY 20 U/S")
                    if (NOTAM_EXCLUDE_PATTERN.test(context) && !NOTAM_CONFIRM_PATTERN.test(context)) {
                        continue;
                    }
                    
                    let v = rwyIdent.replace('-', '/');
                    // 슬래시로 구분된 경우 분리 (예: "02/20" → ["02", "20"])
                    if (v.includes('/')) {
                        v.split('/').forEach(part => {
                            const normalized = normalizeIdent(part.trim());
                            if (normalized && /^\d{2}[LRC]?$/.test(normalized)) {
                                closures.runway.add(normalized);
                            }
                        });
                    } else {
                        const normalized = normalizeIdent(v);
                        if (normalized && /^\d{2}[LRC]?$/.test(normalized)) {
                            closures.runway.add(normalized);
                        }
                    }
                }
            };
            
            // Apron/Gate/Stand 추출 헬퍼 함수
            const extractApronsAndGates = (textUpper) => {
                let m;
                // Apron 추출 (폐쇄 키워드와 함께)
                const apronRegex = new RegExp(NOTAM_APRON_REGEX);
                while ((m = apronRegex.exec(textUpper)) !== null) {
                    if (m[2]) {
                        const apronId = normalizeIdent(m[2]);
                        if (apronId) closures.apron.add(apronId);
                    }
                }
                // Gate 추출 (폐쇄 키워드와 함께)
                const gateRegex = new RegExp(NOTAM_GATE_REGEX);
                while ((m = gateRegex.exec(textUpper)) !== null) {
                    const gateId = normalizeIdent(m[1]);
                    if (gateId) closures.gate.add(gateId);
                }
                // Stand 추출 (폐쇄 키워드와 함께) - Gate로도 추가
                const standRegex = new RegExp(NOTAM_STAND_REGEX);
                while ((m = standRegex.exec(textUpper)) !== null) {
                    const standId = normalizeIdent(m[1]);
                    if (standId) {
                        closures.gate.add(standId);
                        // S07-S13 같은 범위 처리
                        if (standId.includes('-')) {
                            const parts = standId.split('-');
                            if (parts.length === 2) {
                                const prefix = parts[0].match(/^([A-Z]+)/)?.[1] || '';
                                const startNum = parseInt(parts[0].replace(/^[A-Z]+/, ''));
                                const endNum = parseInt(parts[1].replace(/^[A-Z]+/, ''));
                                if (!isNaN(startNum) && !isNaN(endNum) && startNum <= endNum) {
                                    for (let i = startNum; i <= endNum; i++) {
                                        closures.gate.add(prefix + i.toString().padStart(2, '0'));
                                    }
                                }
                            }
                        }
                    }
                }
            };
            
            // 메인 처리 루프
            for (const n of notams) {
                const notamNum = (n.notam_number || n.id || 'unknown').toString();
                let text = (n.text || n.description || n.e_field || n.original_text || '').toString();
                let textWithoutHtml = cleanText(text);
                const tUpper = textWithoutHtml.toUpperCase();
                
                // 제한 사항 키워드 확인
                const hasRestriction = NOTAM_RESTRICTION_PATTERN.test(textWithoutHtml);
                
                if (!hasRestriction) {
                    continue;
                }
                
                // 런웨이 추출
                extractRunways(tUpper);
                
                // 택시웨이 추출 (부분 폐쇄 포함)
                // 부분 폐쇄 먼저 처리 (전체 폐쇄 목록에 추가하지 않음)
                const partialClosureRegex = new RegExp(NOTAM_PARTIAL_CLOSURE_REGEX);
                let partialMatch;
                while ((partialMatch = partialClosureRegex.exec(tUpper)) !== null) {
                    try {
                        const taxiway = normalizeIdent(partialMatch[1]);
                        const intersection1 = normalizeIdent(partialMatch[2]);
                        const intersection2 = normalizeIdent(partialMatch[3]);
                        if (taxiway && intersection1 && intersection2) {
                            partialClosures.push({
                                taxiway: taxiway,
                                intersection1: intersection1,
                                intersection2: intersection2,
                                notam: n
                            });
                        }
                    } catch (e) {
                        // ignore parsing errors
                    }
                }
                
                // 일반 택시웨이 추출 (목록 및 단일 모두 처리)
                const taxiwayPattern = new RegExp(NOTAM_TAXIWAY_PATTERN);
                let m;
                while ((m = taxiwayPattern.exec(tUpper)) !== null) {
                    try {
                        let listStr = m[1] || '';
                        // "BTN", "BETWEEN" 키워드가 포함된 경우는 부분 폐쇄이므로 제외
                        if (/\b(BTN|BETWEEN)\b/i.test(listStr)) {
                            continue;
                        }
                        // "TO", "FROM", "DUE TO" 같은 키워드 전까지만 추출
                        listStr = listStr.replace(/\s+(TO|FROM|DUE\s+TO)\s+.*$/i, '');
                        // AND를 쉼표로 변환 (단어 경계 사용)
                        listStr = listStr.replace(/\bAND\b/gi, ',').replace(/\//g, ',');
                        // 공백과 쉼표로 분리 (연속된 구분자 처리)
                        // 먼저 쉼표로 분리한 다음 각 항목을 공백으로 분리
                        const commaParts = listStr.split(',').map(p => p.trim()).filter(p => p);
                        const parts = [];
                        commaParts.forEach(part => {
                            // 각 쉼표로 구분된 부분을 공백으로도 분리
                            const spaceParts = part.split(/\s+/).map(p => p.trim()).filter(p => p);
                            spaceParts.forEach(sp => {
                                const normalized = normalizeIdent(sp);
                                if (normalized && normalized.length > 0 && /^[A-Z]{1,2}\d{0,2}$/.test(normalized)) {
                                    parts.push(normalized);
                                }
                            });
                        });
                        
                        parts.forEach(p => closures.taxiway.add(p));
                    } catch (e) {
                        console.warn('택시웨이 파싱 오류:', e, '매칭:', m);
                    }
                }
                
                // Apron/Gate 추출
                extractApronsAndGates(tUpper);
            }
            
            return { closures, partialClosures };
        }

        function applyAirportNotamHighlight() {
            if (!currentAirportLayerName || !overlayLayers[currentAirportLayerName]) return;
            const layerItem = overlayLayers[currentAirportLayerName];
            const dataLayer = layerItem.layer;
            const gateLayer = layerItem.gateLayer;
            const { closures, partialClosures } = extractClosureIdentsFromNotams(lastAirportNotams);
            const baseStyle = styleForFeature;
            const gateStyle = styleForGateFeature;
            const makeClosedStyle = (strokeWeight=9) => ({
                strokeColor: '#d32f2f',
                strokeOpacity: 0.5,   // 50% 투명
                strokeWeight,
                fillColor: '#f44336',
                fillOpacity: 0.5,     // 50% 투명
                // google.maps.Data는 zIndex 미지원. 상단 오버레이(Polyline)로 보강.
            });
            const isClosedFeature = (feature) => {
                const rawType = feature.getProperty('aeroway') || feature.getProperty('parking') || 'other';
                const type = classifyAeroway(rawType);
                const ref = normalizeIdent(feature.getProperty('ref') || '');
                const name = normalizeIdent(feature.getProperty('name') || feature.getProperty('name:en') || feature.getProperty('name:ko') || '');
                
                // allProps는 필요할 때만 생성 (성능 최적화)
                let allProps = null;
                const getAllProps = () => {
                    if (allProps === null) {
                        allProps = '';
                        try {
                            feature.forEachProperty((v) => {
                                if (v !== null && v !== undefined) {
                                    allProps += '|' + normalizeIdent(String(v));
                                }
                            });
                        } catch (_) {}
                    }
                    return allProps;
                };
                
                if (type === 'runway') {
                    // 정확한 매칭만 허용 (부분 매칭 방지)
                    for (const r of closures.runway) {
                        // 정확한 매칭: "02" === "02", "20" === "20"
                        if (ref === r || name === r) return true;
                        // 슬래시 포함 형태: "02/20"에 "02" 또는 "20"이 포함되는 경우
                        if (ref.includes('/')) {
                            const parts = ref.split('/');
                            if (parts.some(part => part.trim() === r)) return true;
                        }
                        if (name.includes('/')) {
                            const parts = name.split('/');
                            if (parts.some(part => part.trim() === r)) return true;
                        }
                        // 폴백: allProps에서도 경계 검사 (필요할 때만 생성)
                        if (getWordBoundaryRegex(r).test(getAllProps())) return true;
                    }
                } else if (type === 'taxiway') {
                    for (const t of closures.taxiway) {
                        // 정확한 매칭 우선
                        if (ref === t || name === t) {
                            return true;
                        }
                        // 단일 문자 식별자는 정확히 일치만 허용
                        if (t.length === 1) {
                            continue;
                        } else {
                            // 복합 식별자는 경계가 있는 부분 일치만 허용 (캐싱된 regex 사용)
                            const regex = getWordBoundaryRegex(t);
                            if (regex.test(ref) || regex.test(name)) {
                                return true;
                            }
                        }
                    }
                } else if (type === 'gate') {
                    for (const a of closures.apron) {
                        if (a && (ref.includes(a) || name.includes(a))) return true;
                        // allProps는 마지막에만 확인 (성능 최적화)
                        if (a && getAllProps().includes(a)) return true;
                    }
                    for (const g of closures.gate) {
                        if (g && (ref.includes(g) || name.includes(g))) return true;
                        if (g && getAllProps().includes(g)) return true;
                    }
                }
                return false;
            };
            // 기존 상단 오버레이 제거
            try {
                airportNotamOverlays.forEach(ol => { if (ol && typeof ol.setMap === 'function') ol.setMap(null); });
            } catch (_) {}
            airportNotamOverlays = [];
            
            // 부분 폐쇄 처리 함수
            const processPartialClosures = () => {
                if (!airportNotamVisible || partialClosures.length === 0) return;
                
                // 모든 taxiway feature를 맵에 저장 (ref/name으로 인덱싱)
                const taxiwayFeatures = new Map();
                const intersectionFeatures = new Map();
                
                dataLayer.forEach(feature => {
                    const rawType = feature.getProperty('aeroway') || feature.getProperty('parking') || 'other';
                    const type = classifyAeroway(rawType);
                    const ref = normalizeIdent(feature.getProperty('ref') || '');
                    const name = normalizeIdent(feature.getProperty('name') || feature.getProperty('name:en') || feature.getProperty('name:ko') || '');
                    
                    if (type === 'taxiway') {
                        if (ref) taxiwayFeatures.set(ref, feature);
                        if (name && name !== ref) taxiwayFeatures.set(name, feature);
                    }
                    // intersection도 저장 (다른 taxiway와 교차하는 지점)
                    if (type === 'taxiway' || type === 'runway') {
                        if (ref) intersectionFeatures.set(ref, feature);
                        if (name && name !== ref) intersectionFeatures.set(name, feature);
                    }
                });
                
                // 부분 폐쇄 처리
                partialClosures.forEach(partial => {
                    const { taxiway: twyId, intersection1: int1, intersection2: int2 } = partial;
                    
                    // Taxiway feature 찾기
                    const twyFeature = taxiwayFeatures.get(twyId);
                    if (!twyFeature) return;
                    
                    // Intersection features 찾기 (taxiway나 runway에서 찾기)
                    let int1Feature = intersectionFeatures.get(int1) || taxiwayFeatures.get(int1);
                    let int2Feature = intersectionFeatures.get(int2) || taxiwayFeatures.get(int2);
                    
                    // 직접 찾지 못하면 모든 feature에서 검색
                    if (!int1Feature || !int2Feature) {
                        dataLayer.forEach(feature => {
                            const ref = normalizeIdent(feature.getProperty('ref') || '');
                            const name = normalizeIdent(feature.getProperty('name') || feature.getProperty('name:en') || feature.getProperty('name:ko') || '');
                            if (!int1Feature && (ref === int1 || name === int1)) {
                                int1Feature = feature;
                            }
                            if (!int2Feature && (ref === int2 || name === int2)) {
                                int2Feature = feature;
                            }
                        });
                    }
                    
                    if (!int1Feature || !int2Feature) return;
                    
                    // Intersection 위치 계산
                    const int1Center = getFeatureCenter(int1Feature);
                    const int2Center = getFeatureCenter(int2Feature);
                    
                    if (!int1Center || !int2Center) return;
                    
                    // Taxiway geometry에서 구간 추출
                    const twyGeometry = twyFeature.getGeometry();
                    if (!twyGeometry) return;
                    
                    const extractSegment = (geometry, int1Feature, int2Feature) => {
                        const processGeometry = (geom) => {
                            const type = geom.getType();
                            if (type === 'LineString') {
                                return geom.getArray();
                            } else if (type === 'MultiLineString') {
                                const paths = [];
                                geom.getArray().forEach(g => {
                                    const path = processGeometry(g);
                                    if (path) paths.push(...path);
                                });
                                return paths;
                            }
                            return null;
                        };
                        
                        const path = processGeometry(geometry);
                        if (!path || path.length < 2) return null;
                        
                        // Intersection feature의 geometry에서 교차점 찾기
                        const findIntersectionPoint = (path, intersectionFeature) => {
                            const intGeometry = intersectionFeature.getGeometry();
                            if (!intGeometry) return null;
                            
                            // Intersection의 중심점
                            const intCenter = getFeatureCenter(intersectionFeature);
                            if (!intCenter) return null;
                            
                            // Path에서 가장 가까운 점 찾기
                            let closestPoint = null;
                            let minDist = Infinity;
                            let closestIdx = -1;
                            
                            path.forEach((pt, idx) => {
                                const dist = google.maps.geometry.spherical.computeDistanceBetween(pt, intCenter);
                                if (dist < minDist) {
                                    minDist = dist;
                                    closestPoint = pt;
                                    closestIdx = idx;
                                }
                            });
                            
                            // 거리 임계값 (200m 이내)
                            if (minDist > 200) return null;
                            
                            // 실제 교차점 계산 (선분과 가장 가까운 점)
                            if (closestIdx > 0 && closestIdx < path.length - 1) {
                                const prevPt = path[closestIdx - 1];
                                const nextPt = path[closestIdx + 1];
                                
                                // 선분과 점 사이의 최단 거리 계산
                                const distToPrev = google.maps.geometry.spherical.computeDistanceBetween(prevPt, intCenter);
                                const distToNext = google.maps.geometry.spherical.computeDistanceBetween(nextPt, intCenter);
                                
                                // 더 가까운 선분 선택 (100m 이내)
                                if (distToPrev < distToNext && distToPrev < 100) {
                                    return prevPt;
                                } else if (distToNext < 100) {
                                    return nextPt;
                                }
                            }
                            
                            return closestPoint;
                        };
                        
                        const point1 = findIntersectionPoint(path, int1Feature);
                        const point2 = findIntersectionPoint(path, int2Feature);
                        
                        if (!point1 || !point2) return null;
                        
                        // 두 점의 인덱스 찾기
                        let idx1 = -1, idx2 = -1;
                        let minDist1 = Infinity, minDist2 = Infinity;
                        
                        path.forEach((pt, idx) => {
                            const dist1 = google.maps.geometry.spherical.computeDistanceBetween(pt, point1);
                            const dist2 = google.maps.geometry.spherical.computeDistanceBetween(pt, point2);
                            
                            if (dist1 < minDist1) {
                                minDist1 = dist1;
                                idx1 = idx;
                            }
                            if (dist2 < minDist2) {
                                minDist2 = dist2;
                                idx2 = idx;
                            }
                        });
                        
                        if (idx1 === -1 || idx2 === -1) return null;
                        
                        // 구간 추출 (idx1과 idx2 사이)
                        const startIdx = Math.min(idx1, idx2);
                        const endIdx = Math.max(idx1, idx2);
                        const segment = path.slice(startIdx, endIdx + 1);
                        
                        // 시작/끝점을 정확한 intersection 위치로 교체
                        if (segment.length > 0) {
                            segment[0] = point1;
                            segment[segment.length - 1] = point2;
                        }
                        
                        return segment.length >= 2 ? segment : null;
                    };
                    
                    const segment = extractSegment(twyGeometry, int1Feature, int2Feature);
                    if (segment && segment.length >= 2) {
                        // 부분 폐쇄 구간을 Polyline으로 표시
                        const partialPolyline = new google.maps.Polyline({
                            path: segment,
                            strokeColor: '#d32f2f',
                            strokeOpacity: 0.8,
                            strokeWeight: 12,
                            zIndex: PACKAGE3_Z_INDEX + 10001,
                            map: map,
                            clickable: true,
                            cursor: 'pointer'
                        });
                        
                        // 부분 폐쇄 정보 저장 (partial 변수 사용)
                        partialPolyline.partialClosure = partial;
                        
                        // 클릭 이벤트 추가
                        partialPolyline.addListener('click', function(event) {
                            console.log('부분 폐쇄 Polyline 클릭됨:', partial);
                            if (partial && partial.notam) {
                                showNotamPopupForPartialClosure(partial, event.latLng);
                            } else {
                                console.warn('부분 폐쇄에 NOTAM 정보가 없습니다.');
                            }
                        });
                        
                        airportNotamOverlays.push(partialPolyline);
                    }
                });
            };
            
            // 부분 폐쇄 처리 실행
            processPartialClosures();

            dataLayer.setStyle((feature) => {
                if (!airportLayerVisible) return { visible: false, strokeOpacity: 0, fillOpacity: 0 };
                if (airportNotamVisible && isClosedFeature(feature)) {
                    return makeClosedStyle(9);
                }
                return baseStyle(feature);
            });
            if (gateLayer) {
                gateLayer.setStyle((feature) => {
                    if (!airportLayerVisible) return { visible: false, strokeOpacity: 0, fillOpacity: 0 };
                    if (airportNotamVisible && isClosedFeature(feature)) {
                        return makeClosedStyle(9);
                    }
                    return gateStyle(feature);
                });
            }

            // 상단 오버레이(Polyline) 생성: 데이터 레이어 스타일 위에 두껍게 덮어 표시
            if (airportNotamVisible) {
                const buildPolylinesForFeature = (feature) => {
                    const geom = feature.getGeometry();
                    if (!geom || !geom.getType) return;
                    const type = geom.getType();
                    const makePolyline = (pathArray, feature) => {
                        if (!Array.isArray(pathArray) || pathArray.length < 2) return;
                        const pl = new google.maps.Polyline({
                            path: pathArray,
                            strokeColor: '#d32f2f',
                            strokeOpacity: 0.5,
                            strokeWeight: 15,           // 1.5배 굵게
                            zIndex: PACKAGE3_Z_INDEX + 10000, // 맨 위로
                            map: map,
                            clickable: true,            // 클릭 가능하도록 설정
                            cursor: 'pointer'           // 포인터 커서 표시
                        });
                        
                        // feature 정보를 polyline에 저장
                        pl.feature = feature;
                        
                        // 클릭 이벤트 추가
                        pl.addListener('click', function(event) {
                            console.log('공항 NOTAM Polyline 클릭됨:', feature);
                            showNotamPopupForFeature(feature, event.latLng);
                        });
                        
                        airportNotamOverlays.push(pl);
                    };
                    
                    // 성능 최적화: forEach 대신 for 루프 사용
                    if (type === 'LineString') {
                        const pts = geom.getArray().map(ll => ({ lat: ll.lat(), lng: ll.lng() }));
                        makePolyline(pts, feature);
                    } else if (type === 'MultiLineString') {
                        const arrays = geom.getArray();
                        for (let i = 0; i < arrays.length; i++) {
                            const pts = arrays[i].getArray().map(ll => ({ lat: ll.lat(), lng: ll.lng() }));
                            makePolyline(pts, feature);
                        }
                    } else if (type === 'Polygon') {
                        // 폴리곤은 외곽선만 강조
                        const arrays = geom.getArray();
                        for (let i = 0; i < arrays.length; i++) {
                            const pts = arrays[i].getArray().map(ll => ({ lat: ll.lat(), lng: ll.lng() }));
                            makePolyline(pts, feature);
                        }
                    } else if (type === 'MultiPolygon') {
                        const arrays = geom.getArray();
                        for (let i = 0; i < arrays.length; i++) {
                            const polyArrays = arrays[i].getArray();
                            for (let j = 0; j < polyArrays.length; j++) {
                                const pts = polyArrays[j].getArray().map(ll => ({ lat: ll.lat(), lng: ll.lng() }));
                                makePolyline(pts, feature);
                            }
                        }
                    } else if (type === 'GeometryCollection') {
                        const arrays = geom.getArray();
                        for (let i = 0; i < arrays.length; i++) {
                            const g = arrays[i];
                            const subType = g.getType();
                            if (subType === 'LineString') {
                                const pts = g.getArray().map(ll => ({ lat: ll.lat(), lng: ll.lng() }));
                                makePolyline(pts, feature);
                            } else if (subType === 'MultiLineString' || subType === 'Polygon' || subType === 'MultiPolygon') {
                                // 재귀 처리
                                const fakeFeature = { getGeometry: () => g };
                                buildPolylinesForFeature(fakeFeature);
                            }
                        }
                    }
                };
                try {
                    // dataLayer를 한 번만 순회하여 오버레이 생성 (setStyle은 이미 위에서 처리됨)
                    dataLayer.forEach(feature => {
                        if (isClosedFeature(feature)) {
                            buildPolylinesForFeature(feature);
                        }
                    });
                } catch (_) {}
            }
        }

        // feature와 관련된 NOTAM 찾기 (정확한 매칭)
        function findNotamsForFeature(feature) {
            console.log('findNotamsForFeature 호출:', feature);
            console.log('lastAirportNotams:', lastAirportNotams);
            if (!feature || !lastAirportNotams || lastAirportNotams.length === 0) {
                console.warn('NOTAM 데이터가 없습니다:', { feature: !!feature, notams: lastAirportNotams?.length || 0 });
                return [];
            }
            
            const rawType = feature.getProperty('aeroway') || feature.getProperty('parking') || 'other';
            const type = classifyAeroway(rawType);
            const ref = normalizeIdent(feature.getProperty('ref') || '');
            const name = normalizeIdent(feature.getProperty('name') || feature.getProperty('name:en') || feature.getProperty('name:ko') || '');
            
            console.log('Feature 정보:', { rawType, type, ref, name });
            console.log('검색할 NOTAM 개수:', lastAirportNotams.length);
            
            const matchingNotams = [];
            
            // HTML 태그 제거 헬퍼
            const cleanText = (text) => {
                if (!text) return '';
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = text;
                return (tempDiv.textContent || tempDiv.innerText || text).toUpperCase();
            };
            
            // lastAirportNotams에서 관련 NOTAM 찾기
            for (let i = 0; i < lastAirportNotams.length; i++) {
                const notam = lastAirportNotams[i];
                const notamText = cleanText(notam.original_text || notam.text || notam.description || '');
                
                console.log(`NOTAM #${i} 검사 중:`, { 
                    hasText: !!notamText, 
                    textLength: notamText.length,
                    hasRestriction: NOTAM_RESTRICTION_PATTERN.test(notamText)
                });
                
                // CLSD/CLOSED 키워드가 있는지 확인
                if (!NOTAM_RESTRICTION_PATTERN.test(notamText)) {
                    console.log(`NOTAM #${i}: 제한 키워드 없음, 건너뜀`);
                    continue;
                }
                
                if (type === 'runway') {
                    // 런웨이 정확한 매칭: RWY + 식별자 패턴
                    if (ref) {
                        console.log(`NOTAM #${i}: 런웨이 매칭 시도 (ref: ${ref})`);
                        console.log(`NOTAM 텍스트 (처음 200자): ${notamText.substring(0, 200)}`);
                        
                        // ref가 "18L/36R" 형식인 경우 처리
                        // 특수 문자 이스케이프
                        const refEscaped = ref.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                        
                        // 다양한 패턴 시도
                        const patterns = [
                            // "RWY 18L/36R" 정확한 매칭
                            new RegExp(`\\bRWY\\s+${refEscaped}\\b`, 'i'),
                            // "RWY 18L-36R" 하이픈 형식
                            new RegExp(`\\bRWY\\s+${refEscaped.replace(/\//g, '\\s*-?\\s*')}\\b`, 'i'),
                            // "RWY 18L 36R" 공백 형식
                            new RegExp(`\\bRWY\\s+${refEscaped.replace(/\//g, '\\s+')}\\b`, 'i'),
                            // 각 방향별로도 매칭 시도
                            ...(ref.includes('/') ? ref.split('/').map(d => new RegExp(`\\bRWY\\s+${d.trim().replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\b`, 'i')) : [])
                        ];
                        
                        let matched = false;
                        for (let pIdx = 0; pIdx < patterns.length; pIdx++) {
                            const rwyPattern = patterns[pIdx];
                            if (rwyPattern.test(notamText)) {
                                console.log(`NOTAM #${i}: 런웨이 패턴 매칭 성공 (패턴 #${pIdx})`);
                                const match = rwyPattern.exec(notamText);
                                if (match) {
                                    const contextStart = Math.max(0, match.index - 100);
                                    const contextEnd = Math.min(notamText.length, match.index + match[0].length + 100);
                                    const context = notamText.substring(contextStart, contextEnd);
                                    console.log(`NOTAM #${i}: 컨텍스트: ${context}`);
                                    if (NOTAM_RESTRICTION_PATTERN.test(context)) {
                                        console.log(`NOTAM #${i}: 런웨이 매칭 성공 (ref: ${ref})`);
                                        matchingNotams.push(notam);
                                        matched = true;
                                        break;
                                    } else {
                                        console.log(`NOTAM #${i}: 컨텍스트에 제한 키워드 없음`);
                                    }
                                }
                            }
                        }
                        
                        if (matched) continue;
                    }
                    if (name && name !== ref) {
                        const rwyPattern = new RegExp(`\\bRWY\\s+(${name}|${name.replace(/(\d{2})/, '$1/$1')}|\\d{2}[LRC]?\\s*\\/\\s*\\d{2}[LRC]?)\\b`, 'i');
                        if (rwyPattern.test(notamText)) {
                            const match = rwyPattern.exec(notamText);
                            if (match) {
                                const contextStart = Math.max(0, match.index - 100);
                                const contextEnd = Math.min(notamText.length, match.index + match[0].length + 100);
                                const context = notamText.substring(contextStart, contextEnd);
                                if (NOTAM_RESTRICTION_PATTERN.test(context)) {
                                    matchingNotams.push(notam);
                                }
                            }
                        }
                    }
                } else if (type === 'taxiway') {
                    // 택시웨이 정확한 매칭: TWY/TAXIWAY + 식별자 패턴
                    if (ref) {
                        // "TWY M19", "TAXIWAY M19" 등 패턴 매칭
                        const twyPattern = new RegExp(`\\b(?:TWY|TAXIWAY)\\s+${ref.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\b`, 'i');
                        if (twyPattern.test(notamText)) {
                            // 매칭된 위치 주변에 CLSD 키워드가 있는지 확인
                            const match = twyPattern.exec(notamText);
                            if (match) {
                                const contextStart = Math.max(0, match.index - 100);
                                const contextEnd = Math.min(notamText.length, match.index + match[0].length + 100);
                                const context = notamText.substring(contextStart, contextEnd);
                                if (NOTAM_RESTRICTION_PATTERN.test(context)) {
                                    matchingNotams.push(notam);
                                    continue;
                                }
                            }
                        }
                    }
                    if (name && name !== ref) {
                        const twyPattern = new RegExp(`\\b(?:TWY|TAXIWAY)\\s+${name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\b`, 'i');
                        if (twyPattern.test(notamText)) {
                            const match = twyPattern.exec(notamText);
                            if (match) {
                                const contextStart = Math.max(0, match.index - 100);
                                const contextEnd = Math.min(notamText.length, match.index + match[0].length + 100);
                                const context = notamText.substring(contextStart, contextEnd);
                                if (NOTAM_RESTRICTION_PATTERN.test(context)) {
                                    matchingNotams.push(notam);
                                }
                            }
                        }
                    }
                } else if (type === 'gate') {
                    // 게이트/에이프런 정확한 매칭
                    if (ref) {
                        const gatePattern = new RegExp(`\\b(?:GATE|APRON|STAND|RAMP)\\s+${ref.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\b`, 'i');
                        if (gatePattern.test(notamText)) {
                            const match = gatePattern.exec(notamText);
                            if (match) {
                                const contextStart = Math.max(0, match.index - 100);
                                const contextEnd = Math.min(notamText.length, match.index + match[0].length + 100);
                                const context = notamText.substring(contextStart, contextEnd);
                                if (NOTAM_RESTRICTION_PATTERN.test(context)) {
                                    matchingNotams.push(notam);
                                    continue;
                                }
                            }
                        }
                    }
                    if (name && name !== ref) {
                        const gatePattern = new RegExp(`\\b(?:GATE|APRON|STAND|RAMP)\\s+${name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\b`, 'i');
                        if (gatePattern.test(notamText)) {
                            const match = gatePattern.exec(notamText);
                            if (match) {
                                const contextStart = Math.max(0, match.index - 100);
                                const contextEnd = Math.min(notamText.length, match.index + match[0].length + 100);
                                const context = notamText.substring(contextStart, contextEnd);
                                if (NOTAM_RESTRICTION_PATTERN.test(context)) {
                                    matchingNotams.push(notam);
                                }
                            }
                        }
                    }
                }
            }
            
            console.log(`최종 매칭된 NOTAM 개수: ${matchingNotams.length}`);
            if (matchingNotams.length === 0) {
                console.warn('매칭된 NOTAM이 없습니다. Feature 정보:', { type, ref, name });
                if (lastAirportNotams && lastAirportNotams.length > 0) {

                }
            }
            
            return matchingNotams;
        }

        function findRoutePointByIdent(ident) {
            if (!ident || !Array.isArray(routePoints)) {
                return null;
            }
            const target = ident.trim().toUpperCase();
            if (!target) {
                return null;
            }
            for (const point of routePoints) {
                if (!point) continue;
                const pid = (point.ident || '').toUpperCase();
                if (pid === target) {
                    return point;
                }
            }
            return null;
        }

        function determineConstraintPosition(constraint) {
            if (!constraint) {
                return null;
            }
            const segments = Array.isArray(constraint.segments) ? constraint.segments : [];
            for (const segment of segments) {
                if (!segment) {
                    continue;
                }
                const points = Array.isArray(segment.points) ? segment.points : [];
                if (!points.length) {
                    continue;
                }
                const start = findRoutePointByIdent(points[0]);
                const end = findRoutePointByIdent(points[points.length - 1]);
                if (start && end) {
                    return {
                        lat: (Number(start.lat) + Number(end.lat)) / 2,
                        lng: (Number(start.lng) + Number(end.lng)) / 2
                    };
                }
                for (const ident of points) {
                    const located = findRoutePointByIdent(ident);
                    if (located) {
                        return { lat: Number(located.lat), lng: Number(located.lng) };
                    }
                }
            }
            const waypoints = Array.isArray(constraint.waypoints) ? constraint.waypoints : [];
            for (const ident of waypoints) {
                const located = findRoutePointByIdent(ident);
                if (located) {
                    return { lat: Number(located.lat), lng: Number(located.lng) };
                }
            }
            return null;
        }

        // 두 지점 간 거리 계산 (해버사인 공식, NM 단위)
        function calculateDistanceNM(lat1, lng1, lat2, lng2) {
            const R = 3440.065; // 지구 반경 (NM)
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLng / 2) * Math.sin(dLng / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        // 항로에서 가장 가까운 거리 계산 (NM)
        function getMinDistanceFromRoute(navaidLat, navaidLng) {
            if (!routePoints || routePoints.length === 0) {
                return Infinity;
            }
            let minDistance = Infinity;
            for (const point of routePoints) {
                if (!point || typeof point.lat !== 'number' || typeof point.lng !== 'number') {
                    continue;
                }
                const distance = calculateDistanceNM(navaidLat, navaidLng, point.lat, point.lng);
                if (distance < minDistance) {
                    minDistance = distance;
                }
            }
            return minDistance;
        }

                const airwayMatches = currentRouteAirways.includes(closureAirway);
                if (!airwayMatches) {
                    console.log(`항로 폐쇄 미매칭: ${closureAirway} (항로 코드 없음: ${currentRouteAirways.join(', ')})`);
                    return false;
                }
                
                // 2단계: waypoint 시퀀스 확인 (실제 경로에 포함되는지)
                if (!currentRouteWaypoints || currentRouteWaypoints.length === 0) {
                    // waypoint 시퀀스가 없으면 항로 코드만으로 판단 (fallback)
                    console.log(`✅ 항로 폐쇄 매칭 (waypoint 시퀀스 없음): ${closureAirway} (${closure.start_waypoint}-${closure.end_waypoint})`);
                    return true;
                }
                
                const startWpt = (closure.start_waypoint || '').toUpperCase();
                const endWpt = (closure.end_waypoint || '').toUpperCase();
                
                // waypoint 시퀀스에서 시작/종료 waypoint의 인덱스 찾기
                const startIdx = currentRouteWaypoints.indexOf(startWpt);
                const endIdx = currentRouteWaypoints.indexOf(endWpt);
                
                // 시작/종료 waypoint가 모두 항로에 있고, 순서가 올바른지 확인
                // (시작 waypoint가 종료 waypoint보다 앞에 있어야 함)
                const waypointMatches = startIdx !== -1 && endIdx !== -1 && startIdx < endIdx;
                
                if (waypointMatches) {
                    console.log(`✅ 항로 폐쇄 매칭: ${closureAirway} (${startWpt}[${startIdx}]-${endWpt}[${endIdx}])`);
                    return true;
                } else {
                    console.log(`항로 폐쇄 미매칭: ${closureAirway} ${startWpt}-${endWpt} (waypoint 시퀀스 불일치: startIdx=${startIdx}, endIdx=${endIdx})`);
                    return false;
                }
            });

            console.log(`항로 폐쇄 필터링: 전체 ${package3AirwayClosures.length}개 중 ${filteredClosures.length}개 표시 (항로: ${currentRouteAirways.join(', ')})`);

            filteredClosures.forEach(closure => {
                if (!closure.coordinates || closure.coordinates.length < 2) {
                    console.warn(`항로 폐쇄 좌표 없음: ${closure.airway} ${closure.start_waypoint}-${closure.end_waypoint}`, closure);
                    return;
                }

                // 좌표 배열을 Polyline path로 변환
                const path = closure.coordinates
                    .filter(coord => coord && typeof coord.lat === 'number' && typeof coord.lng === 'number')
                    .map(coord => ({ lat: coord.lat, lng: coord.lng }));

                if (path.length < 2) {
                    return;
                }

                // 항로 폐쇄 구간을 빨간색 굵은 선으로 표시 (원래 항로 선 위에 오버레이)
                // 이중 선 효과로 시각적 구분 (노란색 테두리 + 빨간색 중심)
                
                // 1. 노란색 테두리 (더 굵게)
                const borderPolyline = new google.maps.Polyline({
                    path: path,
                    strokeColor: '#FFD700', // 노란색 테두리
                    strokeOpacity: 0.9,
                    strokeWeight: 10, // 테두리
                    zIndex: 1001, // 가장 위
                    map: package3Visible ? map : null,
                    clickable: false, // 클릭은 중심 선에서만
                    cursor: 'default'
                });
                
                // 2. 빨간색 중심 선 (클릭 가능)
                const polyline = new google.maps.Polyline({
                    path: path,
                    strokeColor: '#d32f2f', // 빨간색
                    strokeOpacity: 1.0, // 완전 불투명
                    strokeWeight: 6, // 중심 선
                    zIndex: 1002, // 테두리보다 위
                    map: package3Visible ? map : null,
                    clickable: true,
                    cursor: 'pointer'
                });

                // 항로 폐쇄 정보를 polyline에 저장
                polyline.__airwayClosure = closure;
                borderPolyline.__airwayClosure = closure; // 테두리에도 저장 (정리용)

                // 클릭 이벤트 추가
                polyline.addListener('click', function(event) {
                    console.log('항로 폐쇄 클릭됨:', closure);
                    if (!package3InfoWindow) {
                        package3InfoWindow = new google.maps.InfoWindow();
                    }
                    
                    let content = `<div style="padding: 8px; max-width: 400px;">`;
                    content += `<strong style="color: #d32f2f;">항로 폐쇄</strong><br>`;
                    content += `<div style="margin: 4px 0;"><strong>NOTAM:</strong> ${escapeHtml(closure.notam_id || 'N/A')}</div>`;
                    content += `<div style="margin: 4px 0;"><strong>항로:</strong> ${escapeHtml(closure.airway || 'N/A')}</div>`;
                    content += `<div style="margin: 4px 0;"><strong>구간:</strong> ${escapeHtml(closure.start_waypoint || 'N/A')} - ${escapeHtml(closure.end_waypoint || 'N/A')}</div>`;
                    if (closure.description) {
                        content += `<div style="margin: 4px 0;">${escapeHtml(closure.description)}</div>`;
                    }
                    if (closure.raw_notam_text) {
                        const formatted = formatNotamRawText(closure.raw_notam_text);
                        content += `<div style="margin-top: 8px; font-size: 11px; color: #666;">`;
                        content += `<pre style="white-space: pre-wrap; font-size: 10px;">${escapeHtml(formatted)}</pre>`;
                        content += `</div>`;
                    }
                    content += `</div>`;

                    package3InfoWindow.setContent(content);
                    package3InfoWindow.setPosition(event.latLng);
                    package3InfoWindow.open({ map });
                });

                package3AirwayClosurePolylines.push(borderPolyline); // 테두리도 저장
                package3AirwayClosurePolylines.push(polyline);
            });
        }

        function refreshPackage3AltitudeMarkers() {
            package3AltitudeMarkers.forEach(marker => {
                try {
                    if (marker && typeof marker.setMap === 'function') {
                        marker.setMap(null);
                    }
                } catch (_) {}
            });
            package3AltitudeMarkers = [];

            if (!package3Constraints.length || !routePoints.length) {
                return;
            }

            package3Constraints.forEach(constraint => {
                const position = determineConstraintPosition(constraint);
                if (!position) {
                    return;
                }
                // AdvancedMarkerElement 사용
                const constraintDiv = document.createElement('div');
                constraintDiv.style.width = '16px';
                constraintDiv.style.height = '16px';
                constraintDiv.style.borderRadius = '50%';
                constraintDiv.style.backgroundColor = '#FF1744';
                constraintDiv.style.opacity = '0.95';
                constraintDiv.style.border = '2px solid #FFFFFF';
                constraintDiv.style.boxShadow = '0 2px 4px rgba(0,0,0,0.3)';
                constraintDiv.style.display = 'flex';
                constraintDiv.style.alignItems = 'center';
                constraintDiv.style.justifyContent = 'center';
                constraintDiv.style.color = '#FFFFFF';
                constraintDiv.style.fontSize = '9px';
                constraintDiv.style.fontWeight = '700';
                constraintDiv.textContent = constraint.altitude_text
                    ? String(constraint.altitude_text).slice(0, 12)
                    : '';
                
                const marker = new google.maps.marker.AdvancedMarkerElement({
                    map: package3Visible ? map : null,
                    position,
                    content: constraintDiv,
                    title: `${constraint.notam_id}${constraint.altitude_text ? ' ' + constraint.altitude_text : ''}`,
                    zIndex: PACKAGE3_Z_INDEX + 2
                });
                marker.__constraint = constraint;
                marker.addListener('click', event => {
                    if (!package3InfoWindow) {
                        package3InfoWindow = new google.maps.InfoWindow();
                    }
                let content = '';
                if (constraint.raw_notam_text) {
                    const formatted = formatNotamRawText(constraint.raw_notam_text);
                    content = `<div class="package3-raw">${escapeHtml(formatted)}</div>`;
                } else {
                    console.warn('Package3 altitude constraint 원문이 비어 있습니다:', constraint.notam_id, constraint);
                    content = '<div class="package3-raw">원문 텍스트를 불러오지 못했습니다.</div>';
                }
                package3InfoWindow.setContent(content);
                    const latLng = event && event.latLng ? event.latLng : marker.getPosition();
                    package3InfoWindow.setPosition(latLng);
                    package3InfoWindow.open({ map });
                });
                package3AltitudeMarkers.push(marker);
            });
        }

        function updatePackage3Visibility(show) {
            package3Overlays.forEach(overlay => {
                try {
                    if (!overlay) {
                        return;
                    }
                    if (typeof overlay.setMap === 'function') {
                        overlay.setMap(show ? map : null);
                    } else if (typeof overlay.setVisible === 'function') {
                        overlay.setVisible(show);
                    } else if ('map' in overlay) {
                        overlay.map = show ? map : null;
                    }
                } catch (_) {}
            });
            package3Labels.forEach(marker => {
                try {
                    if (!marker) {
                        return;
                    }
                    if (typeof marker.__setVisible === 'function') {
                        marker.__setVisible(show);
                    } else if (typeof marker.setMap === 'function') {
                        marker.setMap(show ? map : null);
                    } else if ('map' in marker) {
                        marker.map = show ? map : null;
                    }
                } catch (_) {}
            });
            package3AltitudeMarkers.forEach(marker => {
                try {
                    if (marker && typeof marker.setMap === 'function') {
                        marker.setMap(show ? map : null);
                    }
                } catch (_) {}
            });
            package3NavaidMarkers.forEach(marker => {
                try {
                    if (marker && typeof marker.setMap === 'function') {
                        marker.setMap(show ? map : null);
                    }
                } catch (_) {}
            });
            package3AirwayClosurePolylines.forEach(polyline => {
                try {
                    if (polyline && typeof polyline.setMap === 'function') {
                        polyline.setMap(show ? map : null);
                    }
                } catch (_) {}
            });
        }

        async function loadPackage3Data() {
            try {
                // 페이지 로드 시 Package 1 항로 필터 확인
                if (!currentRouteFilter) {
                    loadRouteFilterFromStorage();
                }
                
                const resp = await fetch('/api/package3-polygons', { cache: 'no-store' });
                if (!resp.ok) {
                    throw new Error(`HTTP ${resp.status}`);
                }
                const data = await resp.json();
                const areas = Array.isArray(data.areas)
                    ? data.areas
                    : (Array.isArray(data.polygons) ? data.polygons : []);
                package3AllAreas = areas; // 모든 영역 데이터 저장
                package3Constraints = Array.isArray(data.altitude_constraints) ? data.altitude_constraints : [];
                package3Navaids = Array.isArray(data.navaids) ? data.navaids : [];
                package3AirwayClosures = Array.isArray(data.airway_closures) ? data.airway_closures : [];
                
                // 항로 필터링 적용
                applyPackage3RouteFilter();

                package3Overlays.forEach(overlay => {
                    try {
                        if (overlay && typeof overlay.setMap === 'function') {
                            overlay.setMap(null);
                        }
                    } catch (_) {}
                });
                package3Labels.forEach(marker => {
                    try {
                        if (!marker) return;
                        if (typeof marker.__setVisible === 'function') {
                            marker.__setVisible(false);
                        } else if (typeof marker.setMap === 'function') {
                            marker.setMap(null);
                        } else if ('map' in marker) {
                            marker.map = null;
                        }
                    } catch (_) {}
                });
                package3AltitudeMarkers.forEach(marker => {
                    try {
                        if (marker && typeof marker.setMap === 'function') {
                            marker.setMap(null);
                        }
                    } catch (_) {}
                });
                package3NavaidMarkers.forEach(marker => {
                    try {
                        if (marker && typeof marker.setMap === 'function') {
                            marker.setMap(null);
                        }
                    } catch (_) {}
                });
                package3AirwayClosurePolylines.forEach(polyline => {
                    try {
                        if (polyline && typeof polyline.setMap === 'function') {
                            polyline.setMap(null);
                        }
                    } catch (_) {}
                });

                package3Overlays = [];
                package3Labels = [];
                package3AltitudeMarkers = [];
                package3NavaidMarkers = [];
                package3AirwayClosurePolylines = [];
                package3AirwayClosurePolylines = [];

                if (!package3InfoWindow) {
                    package3InfoWindow = new google.maps.InfoWindow();
                }

                // 필터링된 영역만 표시
                const filteredAreas = getFilteredPackage3Areas(areas);
                
                filteredAreas.forEach(item => {
                    if (!item || !Array.isArray(item.coordinates)) {
                        return;
                    }
                    const geometry = (item.geometry || 'polygon').toLowerCase();
                    if (geometry === 'circle') {
                        if (!item.coordinates.length) {
                            return;
                        }
                        const center = item.coordinates[0];
                        if (typeof center.lat !== 'number' || typeof center.lng !== 'number') {
                            return;
                        }
                        let radiusMeters = null;
                        if (typeof item.radius_m === 'number' && !Number.isNaN(item.radius_m)) {
                            radiusMeters = item.radius_m;
                        } else if (typeof item.radius_nm === 'number' && !Number.isNaN(item.radius_nm)) {
                            radiusMeters = item.radius_nm * 1852;
                        }
                        if (!radiusMeters) {
                            return;
                        }
                        const circle = new google.maps.Circle({
                            center: { lat: center.lat, lng: center.lng },
                            radius: radiusMeters,
                            strokeColor: item.is_buffer ? '#EC407A' : '#d32f2f',
                            strokeOpacity: item.is_buffer ? 0.6 : 0.85,
                            strokeWeight: item.is_buffer ? 1.5 : 2.2,
                            fillColor: item.is_buffer ? '#f06292' : '#f44336',
                            fillOpacity: item.is_buffer ? 0.12 : 0.22,
                            zIndex: PACKAGE3_Z_INDEX
                        });
                        circle.__package3Item = item;
                        circle.setMap(package3Visible ? map : null);
                        circle.addListener('click', event => {
                            package3InfoWindow.setContent(buildPackage3InfoContent(item));
                            const position = event && event.latLng ? event.latLng : circle.getCenter();
                            package3InfoWindow.setPosition(position);
                            package3InfoWindow.open({ map });
                        });
                        package3Overlays.push(circle);

                        const labelPosition = circle.getCenter() ? circle.getCenter().toJSON() : null;
                        const labelMarker = labelPosition ? createPackage3Label(labelPosition, item) : null;
                        if (labelMarker) {
                            package3Labels.push(labelMarker);
                        }
                        return;
                    }

                    if (item.coordinates.length < 3) {
                        return;
                    }
                    const path = item.coordinates
                        .filter(coord => typeof coord.lat === 'number' && typeof coord.lng === 'number')
                        .map(coord => ({ lat: coord.lat, lng: coord.lng }));
                    if (path.length < 3) {
                        return;
                    }
                    const polygon = new google.maps.Polygon({
                        paths: path,
                        strokeColor: item.is_buffer ? '#EC407A' : '#d32f2f',
                        strokeOpacity: item.is_buffer ? 0.6 : 0.85,
                        strokeWeight: item.is_buffer ? 1.5 : 2.2,
                        fillColor: item.is_buffer ? '#f06292' : '#f44336',
                        fillOpacity: item.is_buffer ? 0.12 : 0.25,
                        zIndex: PACKAGE3_Z_INDEX
                    });
                    polygon.__package3Item = item;
                    polygon.setMap(package3Visible ? map : null);
                    polygon.addListener('click', event => {
                        package3InfoWindow.setContent(buildPackage3InfoContent(item));
                        package3InfoWindow.setPosition(event.latLng);
                        package3InfoWindow.open({ map });
                    });
                    package3Overlays.push(polygon);

                    const center = computePolygonCenter(path);
                    const labelMarker = center ? createPackage3Label(center, item) : null;
                    if (labelMarker) {
                        package3Labels.push(labelMarker);
                    }
                });

                // VOR/NDB out of service 마커 표시
                displayPackage3Navaids();
                
                // 항로 폐쇄 표시
                displayPackage3AirwayClosures();
                
                package3Loaded = true;
                refreshPackage3AltitudeMarkers();
                updatePackage3Visibility(package3Visible);
            } catch (error) {
                console.error('Package 3 NOTAM 로드 오류:', error);
                showAlert('Package 3 NOTAM 데이터를 불러오는 중 오류가 발생했습니다.', 'danger');
                package3Visible = false;
                const toggle = document.getElementById('switchPackage3');
                if (toggle) toggle.checked = false;
            }
        }

        async function setPackage3Visibility(on) {
            package3Visible = on;
            if (on) {
                await ensureMapReady();
                if (!package3Loaded) {
                    await loadPackage3Data();
                } else {
                    updatePackage3Visibility(true);
                }
            } else {
                updatePackage3Visibility(false);
                if (package3InfoWindow) {
                    package3InfoWindow.close();
                }
            }
        }
    </script>
</body>
